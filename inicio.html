<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simon Arcade</title>

<!-- Retro arcade font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="css/arcade.css" rel="stylesheet">

</head>

<body>

<h1>SIMON ARCADE</h1>

<div id="score">
Score: <span id="score-value">0</span>
</div>

<div id="game-board">
<div class="simon-btn green" data-color="green"></div>
<div class="simon-btn red" data-color="red"></div>
<div class="simon-btn yellow" data-color="yellow"></div>
<div class="simon-btn blue" data-color="blue"></div>
</div>

<div id="controls">
<input id="player-name" placeholder="Tu nombre">
<br><br>
<button id="start-game">START</button>
</div>

<div id="ranking">
<h2>RANKING</h2>
<ol id="score-list"></ol>
</div>

<!-- LIBRERÍAS CLÁSICAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.13.6/underscore-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.5.0/backbone-min.js"></script>

<!-- MODELS -->
<script src="js/models/GameModel.js"></script>
<script src="js/models/ScoreModel.js"></script>

<!-- COLLECTIONS -->
<script src="js/collections/ScoresCollection.js"></script>

<!-- VIEWS -->
<script src="js/views/GameBoardView.js"></script>
<script src="js/views/SimonButtonsView.js"></script>
<script src="js/views/ScoreBoardView.js"></script>

<!-- APP -->
<script src="js/app.js"></script>

</body>
</html>
